<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Office PCs | TechChampReviews</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div id="navbar"></div>

<script>
fetch("../navbar.html")
  .then(response => response.text())
  .then(data => {
    document.getElementById("navbar").innerHTML = data;
  });
</script>

<main>
    <section>
        <h2>Best Office PCs & Laptops</h2>

        <!-- FILTER BUTTONS -->
        <div class="filter-buttons">
            <button class="active" onclick="filterSelection('all', this)">All</button>
            <button onclick="filterSelection('budget', this)">Budget</button>
            <button onclick="filterSelection('high', this)">High-End</button>
        </div>

        <!-- Products -->
        <article data-category="high">
            <h3>M4 MacBook Pro</h3>
            <img src="../images/M4 Macbook Pro Home.png" class="homepage-thumbnail">
            <p>
                Premium productivity and creative performance.
                <a href="../reviews/M4-Macbook-Pro.html">Read full review</a>
            </p>

            <h3>M1 MacBook Pro</h3>
            <img src="../images/M1 Macbook Pro Home.png" class="homepage-thumbnail">
            <p>
                Ideal for students, professionals, and creators who need smooth multitasking, strong productivity performance, and a portable design
                <a href="../reviews/M1-Macbook-Pro.html">Read full review</a>
            </p>

        </article>

    </section>
</main>

<div id="footer"></div>

<script>
fetch("../footer.html")
.then(response => response.text())
.then(data => {
    document.getElementById("footer").innerHTML = data;
});

/* FILTER FUNCTION */
function filterSelection(category, button) {
    const articles = document.querySelectorAll("article");
    const buttons = document.querySelectorAll(".filter-buttons button");

    buttons.forEach(btn => btn.classList.remove("active"));
    button.classList.add("active");

    articles.forEach(article => {
        if (category === "all" || article.dataset.category === category) {
            article.style.display = "block";
        } else {
            article.style.display = "none";
        }
    });
}
</script>

</body>
</html>
